name: CI — LogiFlow Monorepo

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, develop, 'feature/**', 'feat/**']
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    name: ${{ matrix.service }} — lint, test & sonar
    strategy:
      # Keep independent outcomes across services.
      fail-fast: false
      matrix:
        service: [automation, gateway, realtime, optimizer]
    uses: ./.github/workflows/reusable-quality.yml
    with:
      service: ${{ matrix.service }}
    secrets: inherit
