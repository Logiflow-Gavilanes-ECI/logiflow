name: Reusable Quality

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_call:
    inputs:
      service:
        description: Service directory under services/
        required: true
        type: string

jobs:
  quality:
    name: ${{ inputs.service }} — lint, test & sonar
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/${{ inputs.service }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/${{ inputs.service }}/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Generate Prisma client
        if: ${{ inputs.service == 'gateway' }}
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm test -- --coverage --coverageReporters=lcov --passWithNoTests

      - name: SonarQube Cloud Scan
        if: ${{ hashFiles(format('services/{0}/sonar-project.properties', inputs.service)) != '' }}
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          projectBaseDir: services/${{ inputs.service }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
