services:
  postgres:
    image: postgres:16-alpine
    container_name: logiflow-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: logiflow_dev
      POSTGRES_DB: logiflow_gateway
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d logiflow_gateway"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: logiflow-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  vroom:
    build:
      context: ./services/optimizer
      dockerfile: Dockerfile.vroom
    container_name: logiflow-vroom
    ports:
      - "3000:3000"

  optimizer:
    build:
      context: .
      dockerfile: services/optimizer/Dockerfile
    container_name: logiflow-optimizer
    ports:
      - "50051:50051"
    environment:
      GRPC_PORT: 50051
      VROOM_URL: http://vroom:3000
      REDIS_URL: redis://redis:6379
      OPTIMIZER_PROTO_PATH: /app/shared/proto/optimizer.proto
      # Dev compose: gateway webhook events don't carry a matrix, so the
      # optimizer needs to fabricate one. Set MATRIX_SOURCE=google with
      # mock mode + no live calls — the GoogleRoutesClient mock falls back
      # to a haversine matrix so VROOM never tries to reach OSRM.
      MATRIX_SOURCE: google
      GOOGLE_ROUTES_ENABLED: "true"
      GOOGLE_ROUTES_ALLOW_CALLS: "false"
      GOOGLE_ROUTES_MOCK: "true"
      AI_PREDICTOR_ENABLED: "false"
      AI_PREDICTOR_URL: http://ai-predictor:5001/adjust
    depends_on:
      vroom:
        condition: service_started
      redis:
        condition: service_healthy
      ai-predictor:
        condition: service_started

  ai-predictor:
    image: python:3.12-alpine
    container_name: logiflow-ai-predictor
    working_dir: /workspace/services/ai-predictor
    command: sh -c "pip install -r requirements.txt && python predictor.py"
    volumes:
      - .:/workspace
    ports:
      - "5001:5001"

  realtime:
    image: node:22-alpine
    container_name: logiflow-realtime
    working_dir: /workspace/services/realtime
    command: sh -c "npm install && node src/index.js"
    volumes:
      - .:/workspace
    environment:
      PORT: 3001
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-key-change-this-in-production
    ports:
      - "3001:3001"
    depends_on:
      redis:
        condition: service_healthy

  gateway:
    image: node:22-alpine
    container_name: logiflow-gateway
    working_dir: /workspace/services/gateway
    command: sh -c "npm install && npx prisma generate && npx prisma migrate deploy && npm run db:seed && npx tsc -p tsconfig.build.json && node dist/src/main.js"
    volumes:
      - .:/workspace
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://postgres:logiflow_dev@postgres:5432/logiflow_gateway?schema=public
      GRPC_OPTIMIZER_HOST: optimizer
      GRPC_OPTIMIZER_PORT: 50051
      GRPC_OPTIMIZER_PROTO_PATH: ../../shared/proto/optimizer.proto
      SOCKETIO_SERVER_HOST: realtime
      SOCKETIO_SERVER_PORT: 3001
      JWT_SECRET: your-super-secret-key-change-this-in-production
      JWT_EXPIRES_IN: 1h
      CORS_ORIGINS: "${CORS_ORIGINS:-https://logiflowapp.z13.web.core.windows.net,http://localhost:4200,capacitor://localhost,http://localhost,https://localhost}"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:3002/api/v1/auth/google/callback}
      GOOGLE_REDIRECT_FRONTEND: ${GOOGLE_REDIRECT_FRONTEND:-http://localhost:4200}
      GOOGLE_REDIRECT_FRONTEND_ADMIN: ${GOOGLE_REDIRECT_FRONTEND_ADMIN:-}
      GOOGLE_REDIRECT_FRONTEND_MOBILE: ${GOOGLE_REDIRECT_FRONTEND_MOBILE:-http://localhost:8100}
      GOOGLE_ADMIN_EMAILS: ${GOOGLE_ADMIN_EMAILS:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY:-}
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      optimizer:
        condition: service_started
      realtime:
        condition: service_started

  # Automations live under the `automation` profile so the platform
  # starts in 7-container mode by default. Bring them up with:
  #   docker compose --profile automation up -d
  n8n:
    # Pinned to the version the workflow JSON was authored against — newer
    # versions changed webhook registration and the imported workflow comes
    # up active in the DB but its webhook never registers.
    image: n8nio/n8n:1.66.0
    container_name: logiflow-n8n
    profiles: [automation]
    environment:
      N8N_BASIC_AUTH_ACTIVE: "false"
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      # Skip owner-setup UI on first boot so the imported workflow can
      # register its webhook without a human clicking through n8n's onboarding.
      N8N_USER_MANAGEMENT_DISABLED: "true"
      N8N_SECURE_COOKIE: "false"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      DB_TYPE: sqlite
      DB_SQLITE_VACUUM_ON_STARTUP: "false"
      WEBHOOK_TARGET: ${WEBHOOK_TARGET:-http://gateway:3002/api/v1/webhook}
      GATEWAY_AUTH_EMAIL: ${GATEWAY_AUTH_EMAIL:-admin@logiflow.app}
      GATEWAY_AUTH_PASSWORD: ${GATEWAY_AUTH_PASSWORD:-Admin2026!}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      OPENCLAW_WEBHOOK_URL: ${OPENCLAW_WEBHOOK_URL:-http://openclaw:18789}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./services/automation/n8n/workflows:/workflows:ro
      - ./services/automation/n8n/entrypoint.sh:/entrypoint.sh:ro
    # The official n8n image entrypoint dispatches the first CMD arg as
    # an n8n subcommand (start / import / etc.), which collides with our
    # bootstrap script. Override it directly; the script `exec`s into
    # `n8n start` so the server still ends up as PID 1.
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      gateway:
        condition: service_started

  openclaw:
    image: alpine/openclaw:2026.5.12-slim
    container_name: logiflow-openclaw
    profiles: [automation]
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      OPENCLAW_GATEWAY_MODE: local
      OPENCLAW_CHANNEL: telegram
    ports:
      - "18789:18789"
    volumes:
      - openclaw_data:/home/node/.openclaw
      - ./services/automation/openclaw/skills:/home/node/.openclaw/skills
    restart: unless-stopped

volumes:
  postgres_data:
  n8n_data:
  openclaw_data:
