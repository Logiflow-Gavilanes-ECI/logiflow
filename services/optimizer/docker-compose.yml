services:
  optimizer:
    build:
      context: ../..
      dockerfile: services/optimizer/Dockerfile
    container_name: logiflow-optimizer
    ports:
      - "50051:50051"
    environment:
      - VROOM_URL=${VROOM_URL:-http://vroom:3000}
      - VROOM_OPTIMIZE_PATH=${VROOM_OPTIMIZE_PATH:-/}
      - GRPC_PORT=${GRPC_PORT:-50051}
      - MATRIX_SOURCE=${MATRIX_SOURCE:-request}
      - OPTIMIZER_VALIDATE_MATRIX_ONLY=${OPTIMIZER_VALIDATE_MATRIX_ONLY:-false}
      - GOOGLE_ROUTES_ENABLED=${GOOGLE_ROUTES_ENABLED:-false}
      - GOOGLE_ROUTES_ALLOW_CALLS=${GOOGLE_ROUTES_ALLOW_CALLS:-false}
      - GOOGLE_ROUTES_MOCK=${GOOGLE_ROUTES_MOCK:-true}
      - MAX_GOOGLE_MATRIX_LOCATIONS=${MAX_GOOGLE_MATRIX_LOCATIONS:-10}
      - GOOGLE_ROUTES_CACHE_TTL_MS=${GOOGLE_ROUTES_CACHE_TTL_MS:-300000}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-}
      - GOOGLE_ROUTES_TIMEOUT_MS=${GOOGLE_ROUTES_TIMEOUT_MS:-20000}
      - GOOGLE_ROUTES_DEPARTURE_TIME=${GOOGLE_ROUTES_DEPARTURE_TIME:-}
      - GOOGLE_ROUTES_ENDPOINT=${GOOGLE_ROUTES_ENDPOINT:-https://routes.googleapis.com/distanceMatrix/v2:computeRouteMatrix}
    depends_on:
      vroom:
        condition: service_started
    networks:
      - logiflow-network

  vroom:
    build:
      context: .
      dockerfile: Dockerfile.vroom
    container_name: logiflow-vroom
    ports:
      - "3000:3000"
    environment:
      - VROOM_PORT=3000
    networks:
      - logiflow-network

networks:
  logiflow-network:
    driver: bridge

