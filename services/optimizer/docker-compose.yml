services:
  optimizer:
    build:
      context: ../..
      dockerfile: services/optimizer/Dockerfile
    container_name: logiflow-optimizer
    ports:
      - "50051:50051"
    environment:
      - VROOM_URL=http://vroom:3000
      - VROOM_OPTIMIZE_PATH=/
      - GRPC_PORT=50051
      - MATRIX_SOURCE=request
      - GOOGLE_ROUTES_ENABLED=false
      - GOOGLE_ROUTES_ALLOW_CALLS=false
      - GOOGLE_ROUTES_MOCK=true
      - MAX_GOOGLE_MATRIX_LOCATIONS=10
      - GOOGLE_ROUTES_CACHE_TTL_MS=300000
      - GOOGLE_MAPS_API_KEY=
      - GOOGLE_ROUTES_TIMEOUT_MS=20000
    depends_on:
      vroom:
        condition: service_started
    networks:
      - logiflow-network

  vroom:
    build:
      context: .
      dockerfile: Dockerfile.vroom
    container_name: logiflow-vroom
    ports:
      - "3000:3000"
    environment:
      - VROOM_ROUTER=osrm
      - OSRM_HOST=osrm
      - VROOM_PORT=3000
    depends_on:
      osrm:
        condition: service_healthy
    networks:
      - logiflow-network

  osrm:
      image: peterevans/osrm-backend:latest
      container_name: logiflow-osrm
      ports:
        - "5000:5000"
      environment:
        - OSRM_PBF_URL=file:///osrm-data/colombia-latest.osm.pbf
        - OSRM_GRAPH_PROFILE=car
      volumes:
        - ./osrm-data:/osrm-data
      healthcheck:
        test: ["CMD-SHELL", "curl -sf 'http://localhost:5000/route/v1/car/-74.0,4.0;-74.1,4.1?overview=false' || exit 1"]
        interval: 30s
        timeout: 10s
        retries: 10
        start_period: 600s
      networks:
        - logiflow-network

networks:
  logiflow-network:
    driver: bridge

