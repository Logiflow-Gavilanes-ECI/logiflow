<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LogiFlow — Centro de Control</title>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>


  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:        #080c14;
      --panel:     #0d1420;
      --border:    #1a2540;
      --accent:    #00e5ff;
      --accent2:   #ff6b35;
      --online:    #00e676;
      --offline:   #ff1744;
      --text:      #e8edf5;
      --muted:     #4a5568;
      --font-mono: 'Space Mono', monospace;
      --font-body: 'DM Sans', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      height: 100vh;
      display: grid;
      grid-template-rows: 56px 1fr;
      grid-template-columns: 320px 1fr;
      overflow: hidden;
    }


    header {
      grid-column: 1 / -1;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
    }

    .logo {
      font-family: var(--font-mono);
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .logo span { color: var(--accent2); }

    .header-divider {
      width: 1px;
      height: 20px;
      background: var(--border);
    }

    .header-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      font-family: var(--font-mono);
    }

    .header-right {
      margin-left: auto;
    }

    .time-display {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--muted);
    }

    aside {
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
    }

    .stat-box {
      background: var(--panel);
      padding: 10px 14px;
      text-align: center;
    }

    .stat-box-value {
      font-family: var(--font-mono);
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-box-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 2px;
    }

    .sidebar-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .section-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    #vehicle-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .log-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }

    .log-container::-webkit-scrollbar { width: 4px; }
    .log-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .log-entry {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(26,37,64,0.5);
      line-height: 1.5;
    }

    .log-time    { color: var(--muted); margin-right: 6px; }
    .log-position { color: var(--online); }
    .log-route    { color: var(--accent2); }
    .log-system   { color: var(--accent); }
    .log-offline  { color: var(--offline); }

    .map-wrapper {
      position: relative;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Logi<span>Flow</span></div>
    <div class="header-divider"></div>
    <div class="header-status">
      <span id="conn-label">Conectando...</span>
    </div>
    <div class="header-right">
      <div class="time-display" id="clock">--:--:--</div>
    </div>
  </header>

  <aside>
    <div class="stats-bar">
      <div class="stat-box">
        <div class="stat-box-value" id="stat-online">0</div>
        <div class="stat-box-label">En línea</div>
      </div>
      <div class="stat-box">
        <div class="stat-box-value" id="stat-offline" style="color: var(--offline)">0</div>
        <div class="stat-box-label">Offline</div>
      </div>
      <div class="stat-box">
        <div class="stat-box-value" id="stat-routes" style="color: var(--accent2)">0</div>
        <div class="stat-box-label">Rutas hoy</div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="section-label">Vehículos</div>
      <div id="vehicle-list">
        <div style="font-size:12px; color: var(--muted); font-family: var(--font-mono);">
          Esperando conexión...
        </div>
      </div>
    </div>

    <div class="sidebar-section" style="padding-bottom: 8px;">
      <div class="section-label">Eventos en tiempo real</div>
    </div>
    <div class="log-container" id="log"></div>
  </aside>

  <div class="map-wrapper">
    <div id="map"></div>
  </div>

  <script>
    function updateClock() {
      document.getElementById('clock').textContent =
        new Date().toLocaleTimeString('es-CO', { hour12: false });
    }
    setInterval(updateClock, 1000);
    updateClock();
  </script>

  <script>
     function connectSocket() {
      const socket = io('http://localhost:3001');

      socket.on('connect', () => {
        document.getElementById('conn-label').textContent = 'Gateway conectado';
        addLog('system', `Conectado al gateway (${socket.id})`);

        socket.emit('join:fleet');
      });

      socket.on('joined', (data) => {
        addLog('system', `Sala unida: ${data.room}`);
      });

      socket.on('disconnect', () => {
        document.getElementById('conn-label').textContent = 'Sin conexión';
        addLog('offline', 'Desconectado del gateway');
      });
    }

    function addLog(type, message) {
      const log  = document.getElementById('log');
      const time = new Date().toLocaleTimeString('es-CO', { hour12: false });
      const cssClass = {
        system:   'log-system',
        position: 'log-position',
        route:    'log-route',
        offline:  'log-offline',
      }[type] || 'log-system';

      log.innerHTML = `<div class="log-entry"><span class="log-time">${time}</span><span class="${cssClass}">${message}</span></div>` + log.innerHTML;
    }
  </script>

  <script>
    const GOOGLE_MAPS_API_KEY = 'YOUR_GOOGLE_MAPS_API_KEY';
  </script>

  <script>
    let map;

    function initMap() {
      map = new google.maps.Map(document.getElementById('map'), {
        center: { lat: 4.7110, lng: -74.0721 },
        zoom: 13,
        styles: [
          { elementType: 'geometry',           stylers: [{ color: '#0d1420' }] },
          { elementType: 'labels.text.fill',   stylers: [{ color: '#4a5568' }] },
          { elementType: 'labels.text.stroke', stylers: [{ color: '#080c14' }] },
          { featureType: 'road',             elementType: 'geometry',        stylers: [{ color: '#1a2540' }] },
          { featureType: 'road',             elementType: 'geometry.stroke', stylers: [{ color: '#080c14' }] },
          { featureType: 'road.highway',     elementType: 'geometry',        stylers: [{ color: '#1f3060' }] },
          { featureType: 'water',            elementType: 'geometry',        stylers: [{ color: '#060a10' }] },
          { featureType: 'poi',              stylers: [{ visibility: 'off' }] },
          { featureType: 'transit',          stylers: [{ visibility: 'off' }] },
        ]
        });

       connectSocket();
    }
  </script>

  <script
    src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&callback=initMap"
    async defer>
  </script>


</body>
</html>
