# LogiFlow production compose (merged)
# - Keeps working gateway/realtime/postgres/n8n configuration from feat/deployement.
# - Adopts optimizer layer structure from develop, but avoids healthchecks that
#   require extra binaries (grpc_health_probe/nc/curl) to keep it functional.
# - All services attach to a single network so service discovery works.
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: logiflow-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: logiflow_gateway
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d logiflow_gateway"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [logiflow-prod]

  redis:
    image: redis:7-alpine
    container_name: logiflow-redis
    command:
      [
        "redis-server",
        "--bind",
        "0.0.0.0",
        "--protected-mode",
        "no",
        "--requirepass",
        "${DB_PASSWORD}",
        "--appendonly",
        "yes",
        "--save",
        "60",
        "1000",
      ]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${DB_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks: [logiflow-prod]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  vroom:
    build:
      context: ./services/optimizer
      dockerfile: Dockerfile.vroom
      args:
        VROOM_VERSION: v1.13.0
        VROOM_EXPRESS_REF: v0.12.0
    image: logiflow/vroom:${IMAGE_TAG:-latest}
    container_name: logiflow-vroom
    restart: unless-stopped
    networks: [logiflow-prod]
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  ai-predictor:
    image: python:3.12-alpine
    container_name: logiflow-ai-predictor
    working_dir: /workspace/services/ai-predictor
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python predictor.py"
    volumes:
      - ./services/ai-predictor:/workspace/services/ai-predictor:ro
    restart: unless-stopped
    environment:
      PORT: 5001
      LOG_LEVEL: ${PREDICTOR_LOG_LEVEL:-info}
      INTERNAL_TOKEN: ${AI_PREDICTOR_INTERNAL_TOKEN:-}
    networks: [logiflow-prod]
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  optimizer:
    build:
      context: .
      dockerfile: services/optimizer/Dockerfile
    image: logiflow/optimizer:${IMAGE_TAG:-latest}
    container_name: logiflow-optimizer
    restart: unless-stopped
    ports:
      - "50051:50051"
    environment:
      GRPC_PORT: "50051"
      METRICS_PORT: "9090"
      LOG_LEVEL: ${OPTIMIZER_LOG_LEVEL:-info}
      VROOM_URL: http://vroom:3000
      REDIS_URL: redis://:${DB_PASSWORD}@redis:6379
      REDIS_ROUTE_TTL_SECONDS: ${REDIS_ROUTE_TTL_SECONDS:-3600}
      OPTIMIZER_PROTO_PATH: /app/shared/proto/optimizer.proto
      MATRIX_SOURCE: ${MATRIX_SOURCE:-google}
      GOOGLE_ROUTES_ENABLED: ${GOOGLE_ROUTES_ENABLED:-true}
      GOOGLE_ROUTES_ALLOW_CALLS: ${GOOGLE_ROUTES_ALLOW_CALLS:-true}
      GOOGLE_ROUTES_MOCK: ${GOOGLE_ROUTES_MOCK:-false}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      MAX_GOOGLE_MATRIX_LOCATIONS: ${MAX_GOOGLE_MATRIX_LOCATIONS:-25}
      AI_PREDICTOR_ENABLED: ${AI_PREDICTOR_ENABLED:-true}
      AI_PREDICTOR_URL: http://ai-predictor:5001/adjust
      AI_PREDICTOR_TIMEOUT_MS: ${AI_PREDICTOR_TIMEOUT_MS:-5000}
      AI_PREDICTOR_INTERNAL_TOKEN: ${AI_PREDICTOR_INTERNAL_TOKEN:-}
      AI_BREAKER_ERROR_PCT: ${AI_BREAKER_ERROR_PCT:-50}
      AI_BREAKER_RESET_MS: ${AI_BREAKER_RESET_MS:-30000}
      AI_BREAKER_VOLUME: ${AI_BREAKER_VOLUME:-5}
      SHUTDOWN_DEADLINE_MS: ${SHUTDOWN_DEADLINE_MS:-25000}
    depends_on:
      vroom:
        condition: service_started
      redis:
        condition: service_healthy
      ai-predictor:
        condition: service_started
    networks: [logiflow-prod]
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  realtime:
    image: node:22-alpine
    container_name: logiflow-realtime
    working_dir: /workspace/services/realtime
    command: sh -c "npm install --production && node src/index.js"
    volumes:
      - ./services/realtime:/workspace/services/realtime
    environment:
      PORT: 3001
      REDIS_URL: redis://:${DB_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "3001:3001"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks: [logiflow-prod]

  gateway:
    image: node:22-alpine
    container_name: logiflow-gateway
    working_dir: /workspace/services/gateway
    command: sh -c "npm install && npx prisma generate && npx prisma migrate deploy && npm run db:seed && npx tsc -p tsconfig.build.json && node dist/src/main.js"
    volumes:
      - ./services/gateway:/workspace/services/gateway
      - ./shared:/workspace/shared
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@postgres:5432/logiflow_gateway?schema=public
      GRPC_OPTIMIZER_HOST: optimizer
      GRPC_OPTIMIZER_PORT: 50051
      GRPC_OPTIMIZER_PROTO_PATH: ../../shared/proto/optimizer.proto
      SOCKETIO_SERVER_HOST: realtime
      SOCKETIO_SERVER_PORT: 3001
      REDIS_URL: redis://:${DB_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 1h
      CORS_ORIGINS: "${CORS_ORIGINS:-https://logiflowapp.z13.web.core.windows.net,http://localhost:4200,capacitor://localhost,http://localhost,https://localhost}"
      AUTH_DEMO_USERNAME: ${AUTH_DEMO_USERNAME:-}
      AUTH_DEMO_PASSWORD: ${AUTH_DEMO_PASSWORD:-}
      AUTH_DEMO_ROLE: ${AUTH_DEMO_ROLE:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-}
      GOOGLE_REDIRECT_FRONTEND: ${GOOGLE_REDIRECT_FRONTEND:-}
      GOOGLE_REDIRECT_FRONTEND_ADMIN: ${GOOGLE_REDIRECT_FRONTEND_ADMIN:-}
      GOOGLE_REDIRECT_FRONTEND_MOBILE: ${GOOGLE_REDIRECT_FRONTEND_MOBILE:-}
      GOOGLE_ADMIN_EMAILS: ${GOOGLE_ADMIN_EMAILS:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY:-}
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      optimizer:
        condition: service_started
      realtime:
        condition: service_started
    restart: unless-stopped
    networks: [logiflow-prod]

  n8n:
    image: n8nio/n8n:1.66.0
    container_name: logiflow-n8n
    environment:
      N8N_BASIC_AUTH_ACTIVE: "false"
      N8N_HOST: ${N8N_HOST:-logiflow-api.eastus2.cloudapp.azure.com}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-https}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      N8N_USER_MANAGEMENT_DISABLED: "true"
      N8N_SECURE_COOKIE: "false"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      DB_TYPE: sqlite
      DB_SQLITE_VACUUM_ON_STARTUP: "false"
      WEBHOOK_TARGET: ${WEBHOOK_TARGET:-http://gateway:3002/api/v1/webhook}
      GATEWAY_AUTH_EMAIL: ${GATEWAY_AUTH_EMAIL:-admin@logiflow.app}
      GATEWAY_AUTH_PASSWORD: ${GATEWAY_AUTH_PASSWORD:-Admin2026!}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      OPENCLAW_WEBHOOK_URL: ${OPENCLAW_WEBHOOK_URL:-http://openclaw:18789}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./services/automation/n8n/workflows:/workflows:ro
      - ./services/automation/n8n/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    depends_on:
      gateway:
        condition: service_started
    restart: unless-stopped
    networks: [logiflow-prod]

  openclaw:
    image: alpine/openclaw:2026.5.12-slim
    container_name: logiflow-openclaw
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      OPENCLAW_GATEWAY_MODE: local
      OPENCLAW_CHANNEL: telegram
    ports:
      - "18789:18789"
    volumes:
      - openclaw_data:/home/node/.openclaw
      - ./services/automation/openclaw/skills:/home/node/.openclaw/skills
    restart: unless-stopped
    networks: [logiflow-prod]

volumes:
  postgres_data:
  n8n_data:
  openclaw_data:
  redis_data:

networks:
  logiflow-prod:
    name: logiflow-prod
    driver: bridge
